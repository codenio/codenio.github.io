<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting…</title>
  <meta http-equiv="refresh" content="0;url=/portfolio?github=codenio" />
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var raw = params.get('github');
      var u = raw && String(raw).trim().replace(/^@+/, '');
      var valid =
        u &&
        u.length >= 1 &&
        u.length <= 39 &&
        /^[a-zA-Z0-9](?:[a-zA-Z0-9]|-(?=[a-zA-Z0-9])){0,38}$/.test(u);
      var dest = valid
        ? '/portfolio?github=' + encodeURIComponent(u)
        : '/portfolio?github=codenio';
      window.location.replace(dest);
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a href="/portfolio?github=codenio">portfolio</a>…</p>
</body>
</html>
